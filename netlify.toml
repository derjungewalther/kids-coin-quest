# Netlify deploy config — Kids Coin Quest
# Everything is static. The "build command" strips the heavy audio bundle
# out of the deploy: ~130 MB of mp3s ship from jsDelivr (free CDN over
# GitHub) instead, so we don't burn Netlify free-tier bandwidth on them.
#
# CRITICAL: audio/manifest.json STAYS in the deploy. It's the (lang|text)
# → mp3 lookup table, only ~40 KB, and serving it same-origin avoids the
# multi-day jsDelivr edge cache that used to make freshly generated audio
# invisible to clients for hours/days after a push (the v1 audio bug).
# texts.json is the generator's source-of-truth — runtime never reads it.
[build]
  publish = "."
  command = "rm -rf audio/*.mp3 audio/texts.json || true"

# Manifest is fetched once per session; revalidate on every load so a
# fresh deploy picks up new entries instantly.
[[headers]]
  for = "/audio/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "application/json; charset=utf-8"

# Keep node_modules, tests, and Playwright artifacts out of the deploy bundle.
[build.processing]
  skip_processing = true

# --- Cache headers -----------------------------------------------------------
# The service worker MUST NOT be HTTP-cached, or users never pick up new
# versions. index.html and manifest.json are revalidated on every load so
# content updates roll out immediately. Icons can sit in the browser cache.

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "application/manifest+json; charset=utf-8"

[[headers]]
  for = "/*.svg"
  [headers.values]
    # Bumped from 1 day to 30 days so the icon.svg referenced from
    # multiple <link> tags lands in the browser disk cache after the
    # first hit. Without this the second link probe (apple-touch-icon)
    # was re-fetching even on warm reloads.
    Cache-Control = "public, max-age=2592000, immutable"

# Browsers + bots probe /favicon.ico by default even when we declare
# an SVG icon via <link>. Redirect to the SVG so the probe doesn't
# 404 (which pollutes server logs and skips the icon entirely on
# clients that hit /favicon.ico without HTML parsing first).
[[redirects]]
  from = "/favicon.ico"
  to   = "/icon.svg"
  status = 200
  force = true

# --- Security headers --------------------------------------------------------
# Kept minimal on purpose. A real CSP comes later, once we've confirmed the
# Google Fonts link and inline styles all survive it.

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
